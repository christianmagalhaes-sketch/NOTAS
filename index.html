<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#23232a">
<title>Notas</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    --paper:#faf9f6;
    --ink:#23232a;
    --ink-soft:#5b5b63;
    --line:#e6e3dc;
    --card:#ffffff;
    --accent:#b5862f;
    --shadow:0 1px 2px rgba(35,35,42,.05),0 8px 24px rgba(35,35,42,.06);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  button{font-family:inherit;cursor:pointer}

  /* ---- Cabeçalho ---- */
  header{
    position:sticky;top:0;z-index:10;
    background:color-mix(in srgb,var(--paper) 85%,transparent);
    backdrop-filter:saturate(140%) blur(12px);
    -webkit-backdrop-filter:saturate(140%) blur(12px);
    border-bottom:1px solid var(--line);
    padding:max(env(safe-area-inset-top),14px) 20px 12px;
  }
  .bar{display:flex;align-items:center;gap:12px;max-width:720px;margin:0 auto}
  h1{
    margin:0;font-size:20px;font-weight:650;letter-spacing:-.01em;flex:1;
  }
  .count{font-size:13px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .search{
    max-width:720px;margin:10px auto 0;position:relative;
  }
  .search input{
    width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);
    border-radius:10px;background:var(--card);color:var(--ink);font-size:15px;
  }
  .search input:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-soft)}

  /* ---- Lista ---- */
  main{max-width:720px;margin:0 auto;padding:16px 20px 120px}
  .grid{display:grid;gap:12px}
  .note{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 16px 14px;box-shadow:var(--shadow);
    cursor:pointer;transition:transform .12s ease,box-shadow .12s ease;
    text-align:left;width:100%;display:block;
  }
  .note:hover{transform:translateY(-1px)}
  .note:active{transform:translateY(0)}
  .note .t{font-weight:600;font-size:16px;margin:0 0 4px;letter-spacing:-.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .note .p{margin:0;color:var(--ink-soft);font-size:14px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .note .d{margin-top:10px;font-size:12px;color:var(--ink-soft);
    font-variant-numeric:tabular-nums}

  .empty{text-align:center;color:var(--ink-soft);padding:64px 20px}
  .empty svg{opacity:.4;margin-bottom:14px}
  .empty p{margin:0;font-size:15px}

  /* ---- Botão novo ---- */
  .fab{
    position:fixed;right:max(env(safe-area-inset-right),20px);
    bottom:max(env(safe-area-inset-bottom),24px);
    width:58px;height:58px;border-radius:50%;border:none;
    background:var(--ink);color:var(--paper);font-size:30px;line-height:1;
    box-shadow:0 6px 20px rgba(35,35,42,.28);z-index:20;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s ease;
  }
  .fab:active{transform:scale(.94)}

  /* ---- Editor ---- */
  .editor{
    position:fixed;inset:0;z-index:30;background:var(--paper);
    display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.7,.2,1);
  }
  .editor.open{transform:none}
  .ehead{
    display:flex;align-items:center;gap:8px;
    padding:max(env(safe-area-inset-top),14px) 16px 12px;
    border-bottom:1px solid var(--line);
  }
  .ghost{
    border:none;background:none;color:var(--ink);font-size:15px;font-weight:550;
    padding:8px 12px;border-radius:9px;
  }
  .ghost:active{background:var(--line)}
  .ghost.danger{color:#b3261e;margin-left:auto}
  .ewrap{flex:1;overflow:auto;padding:18px 20px 40px;max-width:720px;width:100%;margin:0 auto}
  .ewrap input,.ewrap textarea{
    width:100%;border:none;background:none;color:var(--ink);
    font-family:inherit;resize:none;padding:0;
  }
  .ewrap input:focus,.ewrap textarea:focus{outline:none}
  .ewrap input{font-size:24px;font-weight:650;letter-spacing:-.015em;margin-bottom:14px}
  .ewrap textarea{font-size:17px;line-height:1.6;min-height:60vh}
  .saved{font-size:13px;color:var(--ink-soft)}
  @media (prefers-reduced-motion:reduce){
    .editor,.note,.fab{transition:none}
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <h1>Notas</h1>
    <span class="count" id="count"></span>
  </div>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" type="search" placeholder="Procurar" autocomplete="off">
  </div>
</header>

<main>
  <div class="grid" id="list"></div>
  <div class="empty" id="empty" hidden>
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
    <p>Ainda não tens notas. Toca em + para começar.</p>
  </div>
</main>

<button class="fab" id="new" aria-label="Nova nota">+</button>

<section class="editor" id="editor" aria-hidden="true">
  <div class="ehead">
    <button class="ghost" id="back">‹ Notas</button>
    <span class="saved" id="saved"></span>
    <button class="ghost danger" id="del">Apagar</button>
  </div>
  <div class="ewrap">
    <input id="title" placeholder="Título" maxlength="120">
    <textarea id="body" placeholder="Escreve aqui…"></textarea>
  </div>
</section>

<script>
const KEY = "notas/v1";
const $ = s => document.querySelector(s);

let notes = load();
let openId = null;
let saveTimer = null;

function load(){
  try{ return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch{ return []; }
}
function persist(){ localStorage.setItem(KEY, JSON.stringify(notes)); }

function fmt(ts){
  const d = new Date(ts);
  const hoje = new Date();
  const sameDay = d.toDateString() === hoje.toDateString();
  if(sameDay) return d.toLocaleTimeString("pt-PT",{hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString("pt-PT",{day:"2-digit",month:"short",year:"numeric"});
}

function render(){
  const q = $("#search").value.trim().toLowerCase();
  const items = [...notes]
    .sort((a,b)=>b.updated-a.updated)
    .filter(n => !q || (n.title+" "+n.body).toLowerCase().includes(q));

  $("#count").textContent = notes.length ? notes.length : "";
  const list = $("#list");
  list.innerHTML = "";
  $("#empty").hidden = notes.length > 0;

  for(const n of items){
    const el = document.createElement("button");
    el.className = "note";
    const title = n.title.trim() || "Sem título";
    const preview = n.body.trim() || "Nota vazia";
    el.innerHTML = `<p class="t"></p><p class="p"></p><div class="d"></div>`;
    el.querySelector(".t").textContent = title;
    el.querySelector(".p").textContent = preview;
    el.querySelector(".d").textContent = fmt(n.updated);
    el.onclick = () => openNote(n.id);
    list.appendChild(el);
  }
}

function openNote(id){
  const n = notes.find(x=>x.id===id);
  if(!n) return;
  openId = id;
  $("#title").value = n.title;
  $("#body").value = n.body;
  $("#saved").textContent = "Guardado " + fmt(n.updated);
  const ed = $("#editor");
  ed.classList.add("open");
  ed.setAttribute("aria-hidden","false");
  setTimeout(()=> (n.title ? $("#body") : $("#title")).focus(), 280);
}

function newNote(){
  const n = { id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
              title:"", body:"", updated: Date.now() };
  notes.push(n);
  persist();
  openNote(n.id);
}

function closeEditor(){
  flush();
  // remove notas totalmente vazias
  notes = notes.filter(n => n.title.trim() || n.body.trim());
  persist();
  openId = null;
  const ed = $("#editor");
  ed.classList.remove("open");
  ed.setAttribute("aria-hidden","true");
  render();
}

function scheduleSave(){
  $("#saved").textContent = "A guardar…";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flush, 400);
}
function flush(){
  clearTimeout(saveTimer);
  if(!openId) return;
  const n = notes.find(x=>x.id===openId);
  if(!n) return;
  n.title = $("#title").value;
  n.body = $("#body").value;
  n.updated = Date.now();
  persist();
  $("#saved").textContent = "Guardado " + fmt(n.updated);
}

function delNote(){
  if(!openId) return;
  notes = notes.filter(n=>n.id!==openId);
  persist();
  openId = null;
  const ed = $("#editor");
  ed.classList.remove("open");
  ed.setAttribute("aria-hidden","true");
  render();
}

$("#new").onclick = newNote;
$("#back").onclick = closeEditor;
$("#del").onclick = delNote;
$("#title").addEventListener("input", scheduleSave);
$("#body").addEventListener("input", scheduleSave);
$("#search").addEventListener("input", render);
document.addEventListener("keydown", e=>{
  if(e.key==="Escape" && openId) closeEditor();
});

render();

// ---- Service worker: torna a app instalável e offline ----
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=> navigator.serviceWorker.register("./sw.js"));
}
</script>
</body>
</html>
