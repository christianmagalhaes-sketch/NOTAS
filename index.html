<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ponto de Presença</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#566F69">
<style>
  :root{
    --paper-1:#EFEBE1;
    --paper-2:#E5E4DC;
    --ink:#2C2A25;
    --text-soft:#7C766B;
    --line:#D8D3C7;
    --card:#F7F4ED;
    --accent:#566F69;
    --accent-45: rgba(86,111,105,0.45);
    --accent-15: rgba(86,111,105,0.15);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background:linear-gradient(180deg, var(--paper-1), var(--paper-2));
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  body{
    display:flex;
    justify-content:center;
  }

  .app{
    width:100%;
    max-width:640px;
    min-height:100vh;
    padding:env(safe-area-inset-top) 18px calc(env(safe-area-inset-bottom) + 24px) 18px;
    display:flex;
    flex-direction:column;
  }

  header{
    padding-top:22px;
    padding-bottom:8px;
  }

  h1{
    font-size:1.3rem;
    font-weight:600;
    letter-spacing:0.01em;
    margin:0 0 14px 0;
    color:var(--ink);
  }

  .tabs{
    display:flex;
    gap:6px;
    border-bottom:1px solid var(--line);
  }

  .tab-btn{
    appearance:none;
    border:none;
    background:none;
    font-family:inherit;
    font-size:0.95rem;
    color:var(--text-soft);
    padding:10px 6px 12px 6px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }

  .tab-btn.active{
    color:var(--ink);
    border-bottom-color:var(--accent);
    font-weight:600;
  }

  main{
    flex:1;
    padding-top:18px;
  }

  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  .data-hoje{
    font-size:0.85rem;
    color:var(--text-soft);
    margin:0 0 16px 0;
    text-transform:capitalize;
  }

  .pergunta-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    margin-bottom:12px;
  }

  .pergunta-etiqueta{
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-soft);
    margin:0 0 6px 0;
  }

  .pergunta-texto{
    font-family:Georgia, "Times New Roman", serif;
    font-style:italic;
    font-size:1.05rem;
    line-height:1.4;
    margin:0 0 14px 0;
    color:var(--ink);
  }

  .estados{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .estado-btn{
    appearance:none;
    border:1px solid var(--line);
    background:var(--paper-1);
    color:var(--text-soft);
    font-family:inherit;
    font-size:0.85rem;
    padding:9px 12px;
    border-radius:999px;
    cursor:pointer;
    flex:1 1 auto;
    text-align:center;
  }

  .estado-btn[aria-pressed="true"]{
    background:var(--accent);
    border-color:var(--accent);
    color:#FBFAF6;
    font-weight:600;
  }

  .estado-btn:focus-visible,
  .tab-btn:focus-visible,
  .toggle-reflexao:focus-visible,
  textarea:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  .campo-livre{
    margin-bottom:14px;
  }

  .campo-livre label{
    display:block;
    font-size:0.85rem;
    color:var(--text-soft);
    margin-bottom:6px;
  }

  .campo-livre .nota{
    display:block;
    font-size:0.75rem;
    font-style:italic;
    color:var(--text-soft);
    opacity:0.85;
    margin-top:2px;
  }

  textarea{
    width:100%;
    min-height:64px;
    resize:vertical;
    font-family:inherit;
    font-size:0.95rem;
    color:var(--ink);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    line-height:1.4;
  }

  .toggle-reflexao{
    appearance:none;
    width:100%;
    text-align:left;
    border:1px dashed var(--line);
    background:transparent;
    color:var(--accent);
    font-family:inherit;
    font-size:0.9rem;
    font-weight:600;
    padding:12px 14px;
    border-radius:12px;
    cursor:pointer;
    margin:8px 0 14px 0;
  }

  .reflexao-funda{
    margin-bottom:10px;
  }

  .reflexao-funda[hidden]{ display:none; }

  .reflexao-pergunta{
    margin-bottom:14px;
  }

  .reflexao-pergunta p{
    font-family:Georgia, "Times New Roman", serif;
    font-style:italic;
    font-size:0.95rem;
    line-height:1.4;
    color:var(--ink);
    margin:0 0 8px 0;
  }

  /* Olhar para trás */

  .retrato{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    margin-bottom:18px;
  }

  .retrato[hidden]{ display:none; }

  .retrato h2{
    font-size:1rem;
    margin:0 0 4px 0;
  }

  .retrato .sub{
    font-size:0.78rem;
    color:var(--text-soft);
    margin:0 0 14px 0;
  }

  .barra-linha{
    margin-bottom:12px;
  }

  .barra-linha .rotulo{
    font-size:0.82rem;
    color:var(--ink);
    margin-bottom:4px;
    display:flex;
    justify-content:space-between;
  }

  .barra-linha .rotulo span.contagem{
    color:var(--text-soft);
    font-size:0.75rem;
  }

  .barra{
    display:flex;
    height:10px;
    border-radius:6px;
    overflow:hidden;
    background:var(--line);
  }

  .barra .seg-presente{ background:var(--accent); }
  .barra .seg-parte{ background:var(--accent-45); }
  .barra .seg-piloto{ background:var(--line); }

  .frase-retrato{
    font-family:Georgia, "Times New Roman", serif;
    font-style:italic;
    font-size:0.92rem;
    line-height:1.5;
    color:var(--ink);
    margin:14px 0 0 0;
  }

  .lista-dias{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .dia-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
  }

  .dia-data{
    font-size:0.85rem;
    font-weight:600;
    color:var(--ink);
    text-transform:capitalize;
    margin-bottom:8px;
  }

  .dia-pontos{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }

  .dot{
    width:13px;
    height:13px;
    border-radius:50%;
    border:1.5px solid var(--line);
    background:transparent;
  }

  .dot--presente{
    background:var(--accent);
    border-color:var(--accent);
  }

  .dot--parte{
    background:transparent;
    border-color:var(--accent);
  }

  .dot--piloto{
    background:var(--line);
    border-color:var(--line);
  }

  .dia-texto{
    font-size:0.88rem;
    line-height:1.4;
    color:var(--ink);
    margin:0 0 6px 0;
  }

  .dia-texto .rotulo-texto{
    display:block;
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--text-soft);
    margin-bottom:2px;
  }

  .dia-reflexao{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
  }

  .vazio{
    text-align:center;
    color:var(--text-soft);
    font-size:0.9rem;
    padding:30px 10px;
  }

  .guardado-indicator{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translate(-50%, 8px);
    background:var(--ink);
    color:var(--paper-1);
    font-size:0.78rem;
    padding:8px 16px;
    border-radius:999px;
    opacity:0;
    pointer-events:none;
  }

  .guardado-indicator.visivel{
    opacity:0.92;
    transform:translate(-50%, 0);
  }

  @media (prefers-reduced-motion: no-preference){
    .guardado-indicator{
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
  }

  @media (min-width: 700px){
    .estados{ flex-wrap:nowrap; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>Ponto de Presença</h1>
    <nav class="tabs" role="tablist" aria-label="Secções">
      <button type="button" class="tab-btn active" id="btn-tab-hoje" role="tab" aria-selected="true" aria-controls="tab-hoje" data-tab="hoje">Hoje</button>
      <button type="button" class="tab-btn" id="btn-tab-tras" role="tab" aria-selected="false" aria-controls="tab-tras" data-tab="tras">Olhar para trás</button>
    </nav>
  </header>

  <main>
    <section id="tab-hoje" class="tab-panel active" role="tabpanel" aria-labelledby="btn-tab-hoje">
      <p class="data-hoje" id="data-hoje"></p>

      <div id="perguntas-hoje"></div>

      <div class="campo-livre">
        <label for="campo-momento">Um momento de hoje que quero guardar</label>
        <textarea id="campo-momento" rows="2"></textarea>
      </div>

      <div class="campo-livre">
        <label for="campo-autopiloto">Onde dei por mim em piloto automático?
          <span class="nota">sem culpa, só para o ver da próxima vez</span>
        </label>
        <textarea id="campo-autopiloto" rows="2"></textarea>
      </div>

      <button type="button" class="toggle-reflexao" id="btn-toggle-reflexao" aria-expanded="false" aria-controls="reflexao-funda">
        Reflexão mais funda — de dois em dois dias
      </button>

      <div class="reflexao-funda" id="reflexao-funda" hidden></div>
    </section>

    <section id="tab-tras" class="tab-panel" role="tabpanel" aria-labelledby="btn-tab-tras">
      <div class="retrato" id="retrato" hidden>
        <h2>O teu retrato até agora</h2>
        <p class="sub">Um espelho, não uma nota.</p>
        <div id="barras-retrato"></div>
        <p class="frase-retrato" id="frase-retrato"></p>
      </div>

      <div class="lista-dias" id="lista-dias"></div>
    </section>
  </main>

  <div class="guardado-indicator" id="guardado-indicator" aria-live="polite"></div>
</div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "pontoPresenca:v1";

  var DIMENSOES = [
    { chave:"atencao", etiqueta:"Atenção", pergunta:"Houve um momento em que parei tudo e estive só com ela?" },
    { chave:"prioridade", etiqueta:"Prioridade", pergunta:"Ela sentiu hoje que vem em primeiro lugar?" },
    { chave:"carinho", etiqueta:"Carinho", pergunta:"Tive um gesto de carinho que partiu de mim, sem ser pedido?" },
    { chave:"transparencia", etiqueta:"Transparência", pergunta:"Partilhei o meu dia com ela antes de me perguntarem?" },
    { chave:"leveza", etiqueta:"Leveza", pergunta:"Trouxe leveza ao nosso dia, em vez de peso?" }
  ];

  var ESTADOS = [
    { chave:"presente", etiqueta:"Estive presente" },
    { chave:"parte", etiqueta:"Em parte" },
    { chave:"piloto", etiqueta:"Piloto automático" }
  ];

  var REFLEXAO_PERGUNTAS = [
    { chave:"precisou", texto:"O que é que ela precisou de mim nestes dias — e como respondi?" },
    { chave:"empatia", texto:"Consegui pôr-me no lugar de alguém? De quem, e o que mudou?" },
    { chave:"valores", texto:"Mostrei algo que me importa de verdade — uma ideia, uma causa, algo meu?" },
    { chave:"afastado", texto:"De quem ando afastado? A quem podia escrever ou ligar hoje?" },
    { chave:"reconhecimento", texto:"Estes gestos estão a partir de mim — ou ando à espera de reconhecimento?" }
  ];

  var DIAS_SEMANA = ["domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado"];
  var MESES = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

  function pad2(n){ return (n < 10 ? "0" : "") + n; }

  function chaveHoje(d){
    d = d || new Date();
    return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
  }

  function formatarData(chave){
    var partes = chave.split("-").map(Number);
    var data = new Date(partes[0], partes[1] - 1, partes[2]);
    return DIAS_SEMANA[data.getDay()] + ", " + partes[2] + " de " + MESES[partes[1] - 1];
  }

  function criarDiaVazio(){
    return {
      estados:{ atencao:null, prioridade:null, carinho:null, transparencia:null, leveza:null },
      momento:"",
      autopiloto:"",
      reflexao:null
    };
  }

  function carregarBD(){
    try{
      var bruto = localStorage.getItem(STORAGE_KEY);
      return bruto ? JSON.parse(bruto) : {};
    }catch(e){
      return {};
    }
  }

  var bd = carregarBD();
  var hojeChave = chaveHoje();
  var diaEraNovo = false;
  if(!bd[hojeChave]){
    bd[hojeChave] = criarDiaVazio();
    diaEraNovo = true;
  }

  var indicadorTimeout = null;
  function guardar(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(bd));
    }catch(e){}
    mostrarGuardado();
  }

  function mostrarGuardado(){
    var el = document.getElementById("guardado-indicator");
    el.textContent = "Guardado";
    el.classList.add("visivel");
    if(indicadorTimeout){ clearTimeout(indicadorTimeout); }
    indicadorTimeout = setTimeout(function(){
      el.classList.remove("visivel");
    }, 1400);
  }

  // ---- Tabs ----

  function activarTab(nome){
    var paineis = { hoje:"tab-hoje", tras:"tab-tras" };
    var botoes = { hoje:"btn-tab-hoje", tras:"btn-tab-tras" };
    Object.keys(paineis).forEach(function(chave){
      var painel = document.getElementById(paineis[chave]);
      var botao = document.getElementById(botoes[chave]);
      var activo = chave === nome;
      painel.classList.toggle("active", activo);
      botao.classList.toggle("active", activo);
      botao.setAttribute("aria-selected", activo ? "true" : "false");
    });
    if(nome === "tras"){
      renderizarOlharParaTras();
    }
  }

  document.getElementById("btn-tab-hoje").addEventListener("click", function(){ activarTab("hoje"); });
  document.getElementById("btn-tab-tras").addEventListener("click", function(){ activarTab("tras"); });

  // ---- Hoje ----

  function construirHoje(){
    document.getElementById("data-hoje").textContent = formatarData(hojeChave);

    var contentor = document.getElementById("perguntas-hoje");
    contentor.innerHTML = "";

    DIMENSOES.forEach(function(dim){
      var card = document.createElement("div");
      card.className = "pergunta-card";

      var etiqueta = document.createElement("p");
      etiqueta.className = "pergunta-etiqueta";
      etiqueta.textContent = dim.etiqueta;
      card.appendChild(etiqueta);

      var texto = document.createElement("p");
      texto.className = "pergunta-texto";
      texto.textContent = dim.pergunta;
      card.appendChild(texto);

      var grupo = document.createElement("div");
      grupo.className = "estados";
      grupo.setAttribute("role", "group");
      grupo.setAttribute("aria-label", dim.etiqueta);

      ESTADOS.forEach(function(estado){
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "estado-btn";
        btn.textContent = estado.etiqueta;
        var activo = bd[hojeChave].estados[dim.chave] === estado.chave;
        btn.setAttribute("aria-pressed", activo ? "true" : "false");
        btn.addEventListener("click", function(){
          bd[hojeChave].estados[dim.chave] = estado.chave;
          guardar();
          Array.prototype.forEach.call(grupo.querySelectorAll(".estado-btn"), function(outro){
            outro.setAttribute("aria-pressed", "false");
          });
          btn.setAttribute("aria-pressed", "true");
        });
        grupo.appendChild(btn);
      });

      card.appendChild(grupo);
      contentor.appendChild(card);
    });

    var campoMomento = document.getElementById("campo-momento");
    campoMomento.value = bd[hojeChave].momento || "";
    campoMomento.addEventListener("input", function(){
      bd[hojeChave].momento = campoMomento.value;
      guardar();
    });

    var campoAutopiloto = document.getElementById("campo-autopiloto");
    campoAutopiloto.value = bd[hojeChave].autopiloto || "";
    campoAutopiloto.addEventListener("input", function(){
      bd[hojeChave].autopiloto = campoAutopiloto.value;
      guardar();
    });

    var btnToggle = document.getElementById("btn-toggle-reflexao");
    var painelReflexao = document.getElementById("reflexao-funda");

    function construirReflexao(){
      painelReflexao.innerHTML = "";
      if(!bd[hojeChave].reflexao){
        bd[hojeChave].reflexao = { precisou:"", empatia:"", valores:"", afastado:"", reconhecimento:"" };
      }
      REFLEXAO_PERGUNTAS.forEach(function(p){
        var bloco = document.createElement("div");
        bloco.className = "reflexao-pergunta";

        var texto = document.createElement("p");
        texto.textContent = p.texto;
        bloco.appendChild(texto);

        var area = document.createElement("textarea");
        area.rows = 2;
        area.value = bd[hojeChave].reflexao[p.chave] || "";
        area.addEventListener("input", function(){
          bd[hojeChave].reflexao[p.chave] = area.value;
          guardar();
        });
        bloco.appendChild(area);

        painelReflexao.appendChild(bloco);
      });
    }

    btnToggle.addEventListener("click", function(){
      var aberto = painelReflexao.hasAttribute("hidden") === false;
      if(aberto){
        painelReflexao.setAttribute("hidden", "");
        btnToggle.setAttribute("aria-expanded", "false");
      }else{
        if(painelReflexao.childElementCount === 0){
          construirReflexao();
        }
        painelReflexao.removeAttribute("hidden");
        btnToggle.setAttribute("aria-expanded", "true");
      }
    });

    if(bd[hojeChave].reflexao){
      construirReflexao();
      painelReflexao.removeAttribute("hidden");
      btnToggle.setAttribute("aria-expanded", "true");
    }
  }

  // ---- Olhar para trás ----

  function diaTemRegisto(dia){
    if(!dia) return false;
    var temEstado = DIMENSOES.some(function(d){ return dia.estados && dia.estados[d.chave]; });
    var temTexto = (dia.momento && dia.momento.trim()) || (dia.autopiloto && dia.autopiloto.trim());
    var temReflexao = dia.reflexao && Object.keys(dia.reflexao).some(function(k){
      return dia.reflexao[k] && dia.reflexao[k].trim();
    });
    return Boolean(temEstado || temTexto || temReflexao);
  }

  function renderizarRetrato(chavesComRegisto){
    var bloco = document.getElementById("retrato");
    if(chavesComRegisto.length < 5){
      bloco.setAttribute("hidden", "");
      return;
    }

    var contagens = {};
    DIMENSOES.forEach(function(dim){
      contagens[dim.chave] = { presente:0, parte:0, piloto:0, total:0 };
    });

    chavesComRegisto.forEach(function(chave){
      var dia = bd[chave];
      DIMENSOES.forEach(function(dim){
        var valor = dia.estados ? dia.estados[dim.chave] : null;
        if(valor){
          contagens[dim.chave][valor]++;
          contagens[dim.chave].total++;
        }
      });
    });

    var barrasHtml = "";
    var melhorPresente = null, melhorPresenteProp = -1;
    var maisPiloto = null, maisPilotoProp = -1;

    DIMENSOES.forEach(function(dim){
      var c = contagens[dim.chave];
      var total = c.total || 0;
      var propPresente = total ? c.presente / total : 0;
      var propParte = total ? c.parte / total : 0;
      var propPiloto = total ? c.piloto / total : 0;

      if(total > 0 && propPresente > melhorPresenteProp){
        melhorPresenteProp = propPresente;
        melhorPresente = dim.etiqueta;
      }
      if(total > 0 && propPiloto > maisPilotoProp){
        maisPilotoProp = propPiloto;
        maisPiloto = dim.etiqueta;
      }

      barrasHtml += '<div class="barra-linha">' +
        '<div class="rotulo"><span>' + dim.etiqueta + '</span>' +
        '<span class="contagem">' + (total ? Math.round(propPresente * 100) + '% presente' : 'sem registos') + '</span></div>' +
        '<div class="barra">' +
        '<div class="seg-presente" style="flex-basis:' + (propPresente * 100) + '%"></div>' +
        '<div class="seg-parte" style="flex-basis:' + (propParte * 100) + '%"></div>' +
        '<div class="seg-piloto" style="flex-basis:' + (propPiloto * 100) + '%"></div>' +
        '</div></div>';
    });

    document.getElementById("barras-retrato").innerHTML = barrasHtml;

    var frase = "";
    if(melhorPresente){
      frase += "Estás mais presente em " + melhorPresente.toLowerCase() + ".";
    }
    if(maisPiloto){
      frase += (frase ? " " : "") + "É em " + maisPiloto.toLowerCase() + " que mais cais em piloto automático.";
    }
    document.getElementById("frase-retrato").textContent = frase;
    bloco.removeAttribute("hidden");
  }

  function renderizarOlharParaTras(){
    var todasChaves = Object.keys(bd).sort().reverse();
    var chavesComRegisto = todasChaves.filter(function(chave){ return diaTemRegisto(bd[chave]); });

    renderizarRetrato(chavesComRegisto);

    var lista = document.getElementById("lista-dias");
    lista.innerHTML = "";

    if(chavesComRegisto.length === 0){
      var vazio = document.createElement("p");
      vazio.className = "vazio";
      vazio.textContent = "Ainda sem registos. Começa por hoje.";
      lista.appendChild(vazio);
      return;
    }

    chavesComRegisto.forEach(function(chave){
      var dia = bd[chave];
      var card = document.createElement("div");
      card.className = "dia-card";

      var dataEl = document.createElement("div");
      dataEl.className = "dia-data";
      dataEl.textContent = formatarData(chave);
      card.appendChild(dataEl);

      var pontos = document.createElement("div");
      pontos.className = "dia-pontos";
      DIMENSOES.forEach(function(dim){
        var valor = dia.estados ? dia.estados[dim.chave] : null;
        var dot = document.createElement("span");
        var sufixo = valor ? valor : "vazio";
        dot.className = "dot dot--" + sufixo;
        var rotuloEstado = valor ? (ESTADOS.filter(function(e){ return e.chave === valor; })[0] || {}).etiqueta : "sem resposta";
        dot.title = dim.etiqueta + ": " + rotuloEstado;
        dot.setAttribute("aria-label", dim.etiqueta + ": " + rotuloEstado);
        pontos.appendChild(dot);
      });
      card.appendChild(pontos);

      if(dia.momento && dia.momento.trim()){
        var blocoMomento = document.createElement("p");
        blocoMomento.className = "dia-texto";
        blocoMomento.innerHTML = '<span class="rotulo-texto">Um momento</span>';
        blocoMomento.appendChild(document.createTextNode(dia.momento));
        card.appendChild(blocoMomento);
      }

      if(dia.autopiloto && dia.autopiloto.trim()){
        var blocoAuto = document.createElement("p");
        blocoAuto.className = "dia-texto";
        blocoAuto.innerHTML = '<span class="rotulo-texto">Piloto automático</span>';
        blocoAuto.appendChild(document.createTextNode(dia.autopiloto));
        card.appendChild(blocoAuto);
      }

      if(dia.reflexao && Object.keys(dia.reflexao).some(function(k){ return dia.reflexao[k] && dia.reflexao[k].trim(); })){
        var blocoReflexao = document.createElement("div");
        blocoReflexao.className = "dia-reflexao";
        REFLEXAO_PERGUNTAS.forEach(function(p){
          var valor = dia.reflexao[p.chave];
          if(valor && valor.trim()){
            var item = document.createElement("p");
            item.className = "dia-texto";
            item.innerHTML = '<span class="rotulo-texto">' + p.texto + '</span>';
            item.appendChild(document.createTextNode(valor));
            blocoReflexao.appendChild(item);
          }
        });
        card.appendChild(blocoReflexao);
      }

      lista.appendChild(card);
    });
  }

  construirHoje();
  if(diaEraNovo){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(bd)); }catch(e){}
  }

  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
})();
</script>
</body>
</html>
